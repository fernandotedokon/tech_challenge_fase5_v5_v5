version: "3.9"

services:

  # -------------------------
  # POSTGRES AIRFLOW
  # -------------------------
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    networks:
      - datathon-network
    restart: always
    

  # -------------------------
  # AIRFLOW INIT
  # -------------------------
  airflow-init:
    build: ./docker/airflow
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - configure.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    entrypoint: >
      bash -c "
      airflow db upgrade &&
      airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@email.com || true
      "
    networks:
      - datathon-network
    restart: "no"


  # -------------------------
  # AIRFLOW WEBSERVER
  # -------------------------
  airflow-webserver:
    build: ./docker/airflow
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - configure.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      PYTHONPATH: /opt/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./src:/opt/airflow/src
      - ./models:/opt/airflow/models
    ports:
      - "8080:8080"
    command: webserver
    networks:
      - datathon-network
    restart: always

  # -------------------------
  # AIRFLOW SCHEDULER
  # -------------------------
  airflow-scheduler:
    build: ./docker/airflow
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - configure.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      PYTHONPATH: /opt/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./src:/opt/airflow/src
      - ./models:/opt/airflow/models
    command: scheduler
    networks:
      - datathon-network
    restart: always

  # -------------------------
  # API (FastAPI)
  # -------------------------
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: datathon-api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
      - ./models:/app/models
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    networks:
      - datathon-network
    restart: always

  # -------------------------
  # MLFLOW
  # -------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://fraud:fraud@postgres:5432/fraud_db
      --default-artifact-root /mlruns
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlruns
      - mlflow_db:/mlflow.db
      - ./mlflow:/mlflow
      - ./mlruns:/mlruns
    networks:
      - datathon-network
    restart: always

  # -------------------------
  # MINIO
  # -------------------------
  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
    networks:
      - datathon-network
    restart: always

  # -------------------------
  # PROMETHEUS
  # -------------------------
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - datathon-network
    restart: always

  # -------------------------
  # GRAFANA
  # -------------------------
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - datathon-network
    restart: always

  # -------------------------
  # POSTGRES FRAUDE
  # -------------------------
  postgres-fraud:
    image: postgres:14
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: fraud_db
    ports:
      - "5433:5432"
    networks:
      - datathon-network
    restart: always


# -------------------------
# VOLUMES (fora de services)
# -------------------------
volumes:
  minio_data:
  mlflow_data:
  mlflow_db:
  airflow_pgdata:

# -------------------------
# NETWORKS (fora de services)
# -------------------------
networks:
  datathon-network:
    driver: bridge
    